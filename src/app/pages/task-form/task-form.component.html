<div class="container">
  <h2>{{ isEditMode ? 'Modifier la tâche' : 'Nouvelle tâche' }}</h2>

  <div class="task-form">
    <label>Titre :</label>
    <input [(ngModel)]="form.title" placeholder="Titre de la tâche" required>

    <label>Description :</label>
    <textarea [(ngModel)]="form.description" placeholder="Description détaillée"></textarea>

    <label>Priorité :</label>
    <select [(ngModel)]="form.priority">
      <option value="LOW">Basse</option>
      <option value="MEDIUM">Moyenne</option>
      <option value="HIGH">Haute</option>
      <option value="URGENT">Urgente</option>
    </select>

    <button (click)="saveTask()">{{ isEditMode ? 'Mettre à jour' : 'Créer' }}</button>
    <button (click)="goBack()">Annuler</button>
  </div>
</div>
