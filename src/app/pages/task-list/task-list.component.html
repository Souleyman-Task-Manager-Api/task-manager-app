<div class="container">
  <div class="header">
    <h2>📋 Liste des tâches</h2>
    <button class="logout" (click)="logout()">Déconnexion</button>
  </div>

  <button class="add-btn" [routerLink]="['/tasks/create']">+ Nouvelle tâche</button>

  <div class="task-list">
    <div *ngFor="let task of tasks" class="task-card">
      <div class="task-header">
        <h3 [class.completed]="task.status === 'COMPLETED'">{{ task.title }}</h3>
        <span class="priority {{ task.priority }}">{{ task.priority }}</span>
      </div>
      <p>{{ task.description | slice:0:100 }}...</p>
      <div class="task-actions">
        <button (click)="completeTask(task.id)" *ngIf="task.status !== 'COMPLETED'">✓ Terminer</button>
        <button [routerLink]="['/tasks/edit', task.id]">✏ Modifier</button>
        <button (click)="deleteTask(task.id)">🗑 Supprimer</button>
        <button [routerLink]="['/tasks', task.id]">👁 Détail</button>
      </div>
    </div>
  </div>
</div>
