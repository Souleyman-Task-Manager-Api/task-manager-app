<div class="container">
  <h2>Inscription</h2>

  <div *ngIf="success" class="success">
    Compte créé avec succès ! <a routerLink="/login">Connectez-vous</a>
  </div>

  <input [(ngModel)]="username" placeholder="Nom d'utilisateur">
  <input [(ngModel)]="password" type="password" placeholder="Mot de passe">
  <input [(ngModel)]="mail" type="email" placeholder="Email">

  <button (click)="signup()">S'inscrire</button>

  <p *ngIf="error" class="error">{{ error }}</p>
  <p>Déjà un compte ? <a routerLink="/login">Se connecter</a></p>
</div>
